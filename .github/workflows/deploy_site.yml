name: SteuerWende – Website deployen

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Entwurf → Veröffentlicht verschieben
        run: python scripts/approve_draft.py

      - name: Website bauen
        run: python scripts/build_site.py

      - name: Website deployen
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          cname: steuerwende.de
          commit_message: "Artikel veröffentlicht"

      - name: Änderungen in main speichern
        run: |
          git config user.name "SteuerWende Bot"
          git config user.email "bot@steuerwende.de"
          git add articles/published/
          git diff --staged --quiet || git commit -m "Artikel veröffentlicht: $(date '+%d.%m.%Y %H:%M')"
          git push origin main
