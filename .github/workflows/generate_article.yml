name: SteuerWende – Artikel generieren & deployen

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      force_topic:
        description: 'Optionales Thema erzwingen'
        required: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic

      - name: Artikel generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py

      - name: Entwurf → Veröffentlicht verschieben
        run: python scripts/approve_draft.py

      - name: Website bauen
        run: python scripts/build_site.py

      - name: Website deployen
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "Neuer Artikel: $(date '+%d.%m.%Y %H:%M')"

      - name: Änderungen zurück in main pushen
        run: |
          git config user.name "SteuerWende Bot"
          git config user.email "bot@steuerwende.de"
          git add articles/published/
          git diff --staged --quiet || git commit -m "Artikel veröffentlicht: $(date '+%d.%m.%Y %H:%M')"
          git push origin main
