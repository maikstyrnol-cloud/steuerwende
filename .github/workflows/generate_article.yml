name: SteuerWende – Artikel generieren

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      force_topic:
        description: 'Optionales Thema erzwingen'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prüfen ob bereits ein offener PR existiert
        id: check_pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            if (prs.data.length > 0) {
              console.log(`⏭️  ${prs.data.length} offener PR gefunden – überspringe Generierung`);
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Python einrichten
        if: steps.check_pr.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        if: steps.check_pr.outputs.skip == 'false'
        run: pip install anthropic

      - name: Artikel generieren
        if: steps.check_pr.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py

      - name: Entwurf als Branch pushen
        if: steps.check_pr.outputs.skip == 'false'
        id: push
        run: |
          git config user.name "SteuerWende Bot"
          git config user.email "bot@steuerwende.de"
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M)
          BRANCH="entwurf/${TIMESTAMP}"
          git checkout -b $BRANCH
          git add articles/drafts/
          git diff --staged --quiet || git commit -m "Neuer Entwurf: $(date '+%d.%m.%Y %H:%M')"
          git push origin $BRANCH
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Pull Request erstellen
        if: steps.check_pr.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.push.outputs.branch }}';
            const fs = require('fs');
            const draftsDir = 'articles/drafts';
            const files = fs.readdirSync(draftsDir).filter(f => f.endsWith('.json')).sort().reverse();
            let title = 'Neuer Artikel-Entwurf';
            let body = '';
            if (files.length > 0) {
              const content = JSON.parse(fs.readFileSync(`${draftsDir}/${files[0]}`, 'utf8'));
              title = `📝 ${content.titel}`;
              body = `## Neuer Artikel zur Freigabe\n\n` +
                     `**Titel:** ${content.titel}\n\n` +
                     `**Kategorie:** ${content.kategorie}\n\n` +
                     `**Untertitel:** ${content.untertitel}\n\n` +
                     `**Lesezeit:** ${content.lesezeit} Minuten\n\n` +
                     `---\n\n` +
                     `### Artikel freigeben:\n` +
                     `1. Lies den Artikel im **"Files changed"** Tab\n` +
                     `2. Alles okay → klicke **"Merge pull request"**\n` +
                     `3. Nicht okay → klicke **"Close pull request"**\n\n` +
                     `> Generiert am ${new Date().toLocaleString('de-DE')}`;
            }
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              head: branch,
              base: 'main',
              draft: false
            });
