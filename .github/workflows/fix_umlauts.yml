name: SteuerWende – Umlaute korrigieren & neu deployen

on:
  workflow_dispatch:

jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Umlaute korrigieren
        run: python scripts/fix_umlauts.py

      - name: Website neu bauen
        run: python scripts/build_site.py

      - name: Änderungen speichern
        run: |
          git config user.name "SteuerWende Bot"
          git config user.email "bot@steuerwende.de"
          git add articles/published/
          git diff --staged --quiet || git commit -m "Umlaute korrigiert"
          git push origin main

      - name: Website deployen
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
